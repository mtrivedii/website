<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Access Denied</title>
  <link rel="stylesheet" href="style.css?v=1.0.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
</head>
<body>
  <div class="container">
    <h1>⛔ Access Denied</h1>
    <div class="card">
      <h2>You don't have permission to access this page</h2>
      <p>This area requires administrator privileges.</p>
      <p>If you believe you should have access, please contact the system administrator.</p>
      
      <div class="button-container">
        <a href="index.html" class="button">Return to Home</a>
        <a href="/.auth/logout?post_logout_redirect_uri=/" class="button" style="background-color: #ff3366; color: white;">Logout</a>
      </div>
    </div>
  </div>
  
  <style>
    h1 {
      color: #ff3366;
    }
    
    .card {
      background-color: #1a1a1a;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 20px;
      margin: 1rem 0;
      box-shadow: 0 0 10px rgba(255, 0, 0, 0.2);
      text-align: center;
    }
  </style>
</body>
</html>
